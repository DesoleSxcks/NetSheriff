<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>NetSheriff - Painel de Controle</title>
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/startbootstrap-sb-admin-2@4.1.3/css/sb-admin-2.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        .card-counter { border-left: 4px solid #4e73df; }
        .card-danger { border-left: 4px solid #e74a3b; }
        .card-monitor { border-left: 4px solid #1cc88a; }
        .chart-container { position: relative; height: 300px; width: 100%; }
        .chart-pie { height: 250px; }
    </style>
</head>

<body id="page-top">
    <div id="wrapper">
        <ul class="navbar-nav bg-gradient-primary sidebar sidebar-dark accordion" id="accordionSidebar">
            <a class="sidebar-brand d-flex align-items-center justify-content-center" href="#">
                <div class="sidebar-brand-icon rotate-n-15">
                    <i class="fas fa-shield-alt"></i>
                </div>
                <div class="sidebar-brand-text mx-3">NetSheriff</div>
            </a>
            <hr class="sidebar-divider my-0">
            <li class="nav-item active">
                <a class="nav-link" href="#">
                    <i class="fas fa-fw fa-tachometer-alt"></i>
                    <span>Dashboard</span>
                </a>
            </li>
        </ul>

        <div id="content-wrapper" class="d-flex flex-column">
            <div class="container-fluid mt-4">
                
                <div class="row">
                    <div class="col-xl-3 col-md-6 mb-4">
                        <div class="card shadow h-100 py-2 card-counter">
                            <div class="card-body">
                                <div class="text-xs font-weight-bold text-primary text-uppercase mb-1">Alertas (24h)</div>
                                <div class="h5 mb-0 font-weight-bold text-gray-800">1,250</div>
                            </div>
                        </div>
                    </div>
                    <div class="col-xl-3 col-md-6 mb-4">
                        <div class="card shadow h-100 py-2 card-danger">
                            <div class="card-body">
                                <div class="text-xs font-weight-bold text-danger text-uppercase mb-1">Ameaças Críticas</div>
                                <div class="h5 mb-0 font-weight-bold text-gray-800">18</div>
                            </div>
                        </div>
                    </div>
                    <div class="col-xl-3 col-md-6 mb-4">
                        <div class="card shadow h-100 py-2 card-monitor">
                            <div class="card-body">
                                <div class="text-xs font-weight-bold text-success text-uppercase mb-1">Status do Sistema</div>
                                <div class="h5 mb-0 font-weight-bold text-gray-800">Online</div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="row">
                    <div class="col-xl-8">
                        <div class="card shadow mb-4">
                            <div class="card-header py-3"><h6 class="m-0 font-weight-bold text-primary">Volume de Tráfego por Hora</h6></div>
                            <div class="card-body"><canvas id="lineChart"></canvas></div>
                        </div>
                    </div>
                    <div class="col-xl-4">
                        <div class="card shadow mb-4">
                            <div class="card-header py-3"><h6 class="m-0 font-weight-bold text-primary">Distribuição de Ameaças</h6></div>
                            <div class="card-body"><canvas id="pieChart" class="chart-pie"></canvas></div>
                        </div>
                    </div>
                </div>

                <div class="card shadow mb-4">
                    <div class="card-header py-3"><h6 class="m-0 font-weight-bold text-primary">Logs de Segurança em Tempo Real</h6></div>
                    <div class="card-body">
                        <table class="table table-hover">
                            <thead><tr><th>Timestamp</th><th>Origem</th><th>Tipo</th><th>Severidade</th><th>Ação</th></tr></thead>
                            <tbody>
                                <tr><td>10:00</td><td>192.168.1.5</td><td>SQL Injection</td><td><span class="badge badge-danger">Crítico</span></td><td><button class="btn btn-sm btn-danger">Bloquear</button></td></tr>
                                <tr><td>10:05</td><td>10.0.0.12</td><td>Port Scan</td><td><span class="badge badge-warning">Médio</span></td><td><button class="btn btn-sm btn-info">Investigar</button></td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Gráfico de Linha
        new Chart(document.getElementById('lineChart'), {
            type: 'line',
            data: { labels: ['00h', '04h', '08h', '12h', '16h', '20h'], datasets: [{ label: 'Tentativas', data: [5, 12, 8, 25, 10, 5], borderColor: '#4e73df', tension: 0.3 }] }
        });

        // Gráfico de Pizza
        new Chart(document.getElementById('pieChart'), {
            type: 'doughnut',
            data: { labels: ['DDoS', 'Malware', 'SQLi'], datasets: [{ data: [55, 30, 15], backgroundColor: ['#e74a3b', '#f6c23e', '#36b9cc'] }] }
        });
    </script>
</body>
</html>
